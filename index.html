<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nosso Mundo ❤️</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- PLAYER -->
  <div class="music-player">

    <div class="music-info">

      <div class="music-icon">
        🎵
      </div>

      <div>

        <h3 id="musicName">
          Wet Hands
        </h3>

        <span>Minecraft Soundtrack</span>

      </div>

    </div>

    <div class="music-controls">

      <button id="prevBtn">
        ⏮
      </button>

      <button id="playPauseBtn">
        ▶
      </button>

      <button id="nextBtn">
        ⏭
      </button>

    </div>

  </div>

  <!-- MÚSICA -->
  <audio id="music"></audio>

  <!-- HERO -->
  <section class="hero">

    <div class="hero-content">

      <!-- FOTO -->
      <div class="hero-photo">

        <img src="assets/img/Bolo.png">

      </div>

      <span class="mini-text">
        Nosso mundo 🌌
      </span>

      <h1>
        Bolt & Susu
      </h1>

      <!-- DIAS -->
      <p class="days" id="daysCounter">
        0 dias juntos
      </p>

      <!-- DETALHADO -->
      <p class="detailed-time" id="detailedCounter">
        0 anos
      </p>

      <p class="hero-text">
        Talvez a gente não tenha milhares de fotos...
        mas construímos memórias que eu nunca vou esquecer.
      </p>

    </div>

  </section>

  <!-- HISTÓRIA -->
  <section class="story">

    <div class="story-box">

      <h2>Nossa História</h2>

      <p>
        Mesmo em blocos...
        você virou meu lugar favorito.
      </p>

    </div>

  </section>

  <!-- GALERIA -->
  <section class="gallery">

    <h2>Nossas Memórias 📸</h2>

    <div class="gallery-grid">

      <img src="Assets/prints/Screenshot_20251225-163753.Minecraft.png">
      <img src="Assets/prints/Screenshot_20260101-134747.Minecraft.png">
      <img src="Assets/prints/Screenshot_20260131-013810.Minecraft.png">
      <img src="Assets/prints/CasaServidor.png">
      <img src="Assets/prints/Casa1.png">
      <img src="Assets/prints/Quase.png">

    </div>

  </section>

  <script src="script.js"></script>

</body>

</html>
